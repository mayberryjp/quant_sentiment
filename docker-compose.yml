services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sentiment
      POSTGRES_PASSWORD: sentiment
      POSTGRES_DB: sentiment
    ports:
      - "5432:5432"
    volumes:
      - sentiment_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentiment"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://sentiment:sentiment@db:5432/sentiment
      API_LISTEN_ADDRESS: 0.0.0.0
      API_PORT: "8017"
    ports:
      - "8017:8017"
    depends_on:
      db:
        condition: service_healthy

volumes:
  sentiment_pgdata:
